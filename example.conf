# Container Stack Manager Default Configuration
# This file contains default configuration values for CSM
# Override these in user.conf or via environment variables (CSM_ prefix)

# ======================
# Core Configuration
# ======================

# Container Runtime (podman or docker)
CSM_CONTAINER_RUNTIME=podman

# User/Group for container processes
CSM_STACKS_UID=2000
CSM_STACKS_GID=2000

# ======================
# Directory Structure
# ======================

# Base directory (automatically set to /srv/stacks if not specified)
CSM_ROOT_DIR="/srv/stacks"

# Core directories (relative to CSM_ROOT)
CSM_STACKS_DIR="${CSM_ROOT_DIR}"
CSM_BACKUP_DIR="${CSM_ROOT_DIR}/.backup"
CSM_COMMON_DIR="${CSM_ROOT_DIR}/.common"
CSM_CONFIGS_DIR="${CSM_COMMON_DIR}/configs"
CSM_SECRETS_DIR="${CSM_COMMON_DIR}/secrets"
CSM_TEMPLATE_DIR="${CSM_COMMON_DIR}/templates"

# File names
CSM_EXAMPLE_ENV="${CSM_COMMON_DIR}/example.env"
CSM_STACK_CONF=".env"
CSM_STACK_FILE="compose.yml"

# ======================
# Template Configuration
# ======================

CSM_TEMPLATE_SOURCE="github"
CSM_TEMPLATE_BRANCH="main"
CSM_TEMPLATE_REPO_NAME="techtinker/docker_stack_templates"
CSM_TEMPLATE_GITLAB_URL="https://www.gitlab.com/${CSM_TEMPLATE_REPO_NAME}"
CSM_TEMPLATE_GITLAB_RAW="${CSM_TEMPLATE_GITLAB_URL}/-/raw/${CSM_TEMPLATE_BRANCH}"
CSM_TEMPLATE_GITHUB_URL="https://github.com/${CSM_TEMPLATE_REPO_NAME}"
CSM_TEMPLATE_GITHUB_RAW="${CSM_TEMPLATE_GITHUB_URL}/raw/${CSM_TEMPLATE_BRANCH}"
CSM_TEMPLATE_UPDATE_INTERVAL=7  # days

# ======================
# Backup Configuration
# ======================

CSM_BACKUP_MAX_AGE=30  # days
CSM_BACKUP_COMPRESSION="zip"

# ======================
# Network Configuration
# ======================

CSM_NETWORK_NAME="csm_network"
CSM_NETWORK_SUBNET="172.20.0.0/16"

# ======================
# Volume Configuration
# ======================

CSM_VOLUME_DRIVER="local"
CSM_VOLUME_LABEL="csm.volume"
